name: Update Sitemap & Request Indexing

on:
  push:
    paths:
      - 'data.csv'   # data.csv가 바뀔 때만 실행

jobs:
  sitemap-and-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # 이전 커밋과 비교하기 위해

      - name: Generate sitemap.xml
        run: |
          python3 - <<'EOF'
          import csv, datetime
          from urllib.parse import quote

          BASE = "https://hwiruruk.github.io/favoread/"
          TODAY = datetime.date.today().isoformat()

          names = set()
          with open("data.csv", encoding="utf-8") as f:
              reader = csv.reader(f)
              next(reader)  # 헤더 건너뜀
              for row in reader:
                  if row and row[0].strip():
                      names.add(row[0].strip())

          lines = [
              '<?xml version="1.0" encoding="UTF-8"?>',
              '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">',
              '  <url>',
              '    <loc>https://hwiruruk.github.io/readinglab/</loc>',
              f'    <lastmod>{TODAY}</lastmod>',
              '    <priority>0.8</priority>',
              '  </url>',
              '  <url>',
              f'    <loc>{BASE}</loc>',
              f'    <lastmod>{TODAY}</lastmod>',
              '    <priority>1.0</priority>',
              '  </url>',
          ]

          for name in sorted(names):
              lines += [
                  '  <url>',
                  f'    <loc>{BASE}?celeb={quote(name, safe="()")}</loc>',
                  f'    <lastmod>{TODAY}</lastmod>',
                  '    <priority>0.7</priority>',
                  '  </url>',
              ]

          lines.append('</urlset>')

          with open("sitemap.xml", "w", encoding="utf-8") as f:
              f.write('\n'.join(lines) + '\n')

          print(f"✅ sitemap.xml 생성 완료: 총 {len(names)}명")
          EOF

      - name: Detect new & removed celebs
        id: diff
        run: |
          python3 - <<'EOF'
          import csv, subprocess, json
          from urllib.parse import quote

          BASE = "https://hwiruruk.github.io/favoread/"

          def get_names(ref):
              try:
                  result = subprocess.run(
                      ["git", "show", f"{ref}:data.csv"],
                      capture_output=True, text=True
                  )
                  if result.returncode != 0:
                      return set()
                  lines = result.stdout.splitlines()
                  names = set()
                  reader = csv.reader(lines)
                  next(reader)
                  for row in reader:
                      if row and row[0].strip():
                          names.add(row[0].strip())
                  return names
              except:
                  return set()

          prev = get_names("HEAD~1")
          curr = get_names("HEAD")

          added   = curr - prev
          removed = prev - curr

          added_urls   = [f"{BASE}?celeb={quote(n, safe='()')}" for n in sorted(added)]
          removed_urls = [f"{BASE}?celeb={quote(n, safe='()')}" for n in sorted(removed)]

          # 추가된 URL이 없으면 홈 URL이라도 요청
          if not added_urls:
              added_urls = [BASE]

          with open("added_urls.json",   "w") as f: json.dump(added_urls,   f)
          with open("removed_urls.json", "w") as f: json.dump(removed_urls, f)

          print(f"➕ 추가: {len(added)}명 → {added_urls}")
          print(f"➖ 삭제: {len(removed)}명 → {removed_urls}")
          EOF

      - name: Request indexing for new & updated URLs
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: |
          pip install cryptography --quiet
          python3 - <<'EOF'
          import json, os, time, urllib.request, urllib.parse, base64

          key = json.loads(os.environ["GOOGLE_INDEXING_KEY"])

          # ── 액세스 토큰 발급 ──────────────────────────────────
          import time as _time
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding

          now = int(_time.time())
          header  = base64.urlsafe_b64encode(
              json.dumps({"alg": "RS256", "typ": "JWT"}).encode()
          ).rstrip(b"=").decode()
          payload = base64.urlsafe_b64encode(json.dumps({
              "iss": key["client_email"],
              "scope": "https://www.googleapis.com/auth/indexing",
              "aud": "https://oauth2.googleapis.com/token",
              "exp": now + 3600,
              "iat": now,
          }).encode()).rstrip(b"=").decode()

          private_key = serialization.load_pem_private_key(
              key["private_key"].encode(), password=None
          )
          signature = private_key.sign(
              f"{header}.{payload}".encode(), padding.PKCS1v15(), hashes.SHA256()
          )
          sig_b64 = base64.urlsafe_b64encode(signature).rstrip(b"=").decode()
          jwt_token = f"{header}.{payload}.{sig_b64}"

          data = urllib.parse.urlencode({
              "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
              "assertion": jwt_token,
          }).encode()
          req = urllib.request.Request(
              "https://oauth2.googleapis.com/token", data=data, method="POST"
          )
          with urllib.request.urlopen(req) as resp:
              token = json.loads(resp.read())["access_token"]

          print("✅ 토큰 발급 완료")

          # ── URL 요청 함수 ─────────────────────────────────────
          def notify(url, action="URL_UPDATED"):
              body = json.dumps({"url": url, "type": action}).encode()
              req = urllib.request.Request(
                  "https://indexing.googleapis.com/v3/urlNotifications:publish",
                  data=body,
                  headers={"Content-Type": "application/json", "Authorization": f"Bearer {token}"},
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      print(f"  ✅ [{action}] {url}")
              except urllib.error.HTTPError as e:
                  print(f"  ❌ [{action}] {url} → {e.code} {e.read().decode()}")
              time.sleep(1)

          # ── 추가 URL 색인 요청 ────────────────────────────────
          with open("added_urls.json") as f:
              added_urls = json.load(f)

          print(f"\n📬 색인 요청: {len(added_urls)}개")
          for url in added_urls:
              notify(url, "URL_UPDATED")

          # ── 삭제 URL 색인 제거 요청 ───────────────────────────
          with open("removed_urls.json") as f:
              removed_urls = json.load(f)

          if removed_urls:
              print(f"\n🗑️ 색인 제거 요청: {len(removed_urls)}개")
              for url in removed_urls:
                  notify(url, "URL_DELETED")

          print("\n🎉 완료")
          EOF

      - name: Commit & push sitemap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "chore: sitemap 자동 갱신 ($(date '+%Y-%m-%d'))"
          git push
