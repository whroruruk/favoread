<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>최애의 독서 | Archive</title>
  <meta name="google-site-verification" content="Xp_wp7z_jzyn988v7pST0Yvh1nYHCJnKaxip3Bx_FK0" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;400;600;900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Space Grotesk"', 'sans-serif'],
          },
          colors: {
            'ink': '#000000',
            'paper': '#ffffff',
            'paper-dark': '#f4f4f0',
            'muted': '#666666',
            'neo-mint': '#a7f3d0',
            'neo-pink': '#fbcfe8',
            'neo-yellow': '#fde047'
          },
          boxShadow: {
            'neo': '4px 4px 0px 0px rgba(0,0,0,1)',
            'neo-lg': '8px 8px 0px 0px rgba(0,0,0,1)',
            'neo-sm': '2px 2px 0px 0px rgba(0,0,0,1)'
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(15px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.8s ease-out forwards',
            'fade-in-delayed': 'fadeIn 1s ease-out 0.2s forwards',
            'fade-in-fast': 'fadeIn 0.5s ease-out forwards'
          }
        }
      }
    }
  </script>

  <style>
    /* ─── 기본 레이아웃 ────────────────────────────────────────────
       Google Sites iframe 환경에서는 height:100% 대신 min-height 사용
       ────────────────────────────────────────────────────────────── */
    html {
      min-height: 100%;
    }
    body {
      min-height: 100%;
      background-color: #fcfaf5;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::selection { background: #fde047; color: #000; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }

    /* ─── 그리드 카드 호버 ─────────────────────────────────────── */
    .celeb-portrait {
      transition: transform 0.4s ease, filter 0.4s ease;
    }
    .group:hover .celeb-portrait {
      transform: scale(1.05);
      filter: brightness(1.05);
    }

    /* ─── 모달 오버레이 ────────────────────────────────────────── */
    .modal-overlay {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* ─── 스와이퍼 트랙 ────────────────────────────────────────── */
    .swiper-track {
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ─── 모달 wrapper: 모바일·PC 모두 콘텐츠 높이에 맞게 줄어듦 ── */
    #modal-inner {
      overflow: hidden;
      height: auto;
      max-height: 92vh;
      max-height: 92svh;
    }

    /* ─── 모달 우측 패널 ─────────────────────────────────────────── */
    .modal-right {
      display: flex;
      flex-direction: column;
    }

    /* ─── 스와이퍼 뷰포트: 모바일/PC 모두 고정 높이 ─────────────── */
    #swiper-viewport {
      height: 260px;
      flex-shrink: 0;
      overflow: hidden;
    }
    @media (min-width: 768px) {
      #swiper-viewport { height: 360px; }
    }

    /* ─── 슬라이드: 고정 높이 안에서 스크롤 ──────────────────────── */
    .slide-scroll-area {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ─── 슬라이드 내 인라인 링크 ──────────────────────────────── */
    .book-inline-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #000;
      border-bottom: 1.5px solid #000;
      padding-bottom: 1px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .book-inline-link:hover { opacity: 0.5; }
  </style>
</head>
<body class="font-serif relative selection:bg-neo-yellow selection:text-ink">

  <main id="app-root" class="max-w-5xl mx-auto px-4 sm:px-6 py-12 md:py-24">
    
    <header class="flex flex-col items-center mb-16 md:mb-20 opacity-0 animate-fade-in">
      <h1 class="text-4xl sm:text-5xl md:text-6xl font-black tracking-tight mb-4 text-ink text-center">최애의 독서</h1>
      <p class="text-ink font-sans font-bold text-xs sm:text-sm tracking-[0.15em] mb-8 uppercase bg-neo-yellow border-2 border-ink px-4 py-1 shadow-neo-sm text-center">Archive of their reads</p>
      
      <div id="status-indicator" class="flex items-center gap-2 text-[10px] sm:text-xs font-sans font-bold tracking-wider text-ink border-2 border-ink bg-white px-3 py-1.5 shadow-neo-sm">
        <span id="status-dot" class="w-2 h-2 rounded-full bg-ink animate-pulse"></span>
        <span id="status-text">Booting System...</span>
      </div>
    </header>

    <div class="max-w-xl mx-auto mb-16 md:mb-20 relative opacity-0 animate-fade-in-delayed">
      <input type="text" id="search-input" 
        class="w-full bg-white border-2 border-ink shadow-neo px-4 sm:px-6 py-3 sm:py-4 text-center text-base sm:text-lg focus:outline-none focus:shadow-neo-lg focus:-translate-y-1 transition-all placeholder:text-muted/50 tracking-wide font-sans font-bold"
        placeholder="Search by name or title">
    </div>

    <div id="grid-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-4 sm:gap-x-6 gap-y-8 sm:gap-y-12">
    </div>

    <div id="empty-state" class="hidden text-center py-20 text-ink font-sans font-bold tracking-widest text-base sm:text-lg">
      No results found.
    </div>

  </main>

  <!-- ════════════════════════════════════════════════════════════
       모달 오버레이
       ════════════════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay fixed inset-0 bg-ink/80 z-50 flex items-center justify-center p-3 sm:p-4 md:p-10 backdrop-blur-sm">

    <!-- 모달 컨테이너: 닫기 버튼을 내부에 배치해 overflow-hidden 충돌 방지 -->
    <div id="modal-inner" class="w-full max-w-6xl bg-paper border-4 border-ink shadow-neo-lg relative
      flex flex-col md:flex-row">

      <!-- ── 닫기 버튼: 항상 내부 우측 상단 ── -->
      <button id="close-modal"
        class="absolute top-2 right-2 z-50
          w-9 h-9 sm:w-10 sm:h-10
          flex items-center justify-center
          bg-neo-pink border-2 border-ink shadow-neo-sm
          text-ink font-sans font-black text-base sm:text-lg
          hover:bg-neo-yellow hover:shadow-neo
          active:translate-y-0.5 active:shadow-none
          transition-all">
        ✕
      </button>

      <!-- ════════════════════════════════
           왼쪽: 연예인 프로필
           ════════════════════════════════ -->
      <div class="w-full md:w-[280px] lg:w-[300px] flex-shrink-0
        flex flex-row md:flex-col
        justify-start md:justify-center
        items-center
        bg-white
        border-b-4 md:border-b-0 md:border-r-4 border-ink
        p-3 sm:p-4 md:p-10
        gap-3 sm:gap-4 md:gap-0">

        <!-- 프로필 이미지 -->
        <div class="w-14 h-18 sm:w-20 sm:h-24 md:w-44 md:h-56 lg:w-48 lg:h-64
          overflow-hidden md:mb-6
          border-2 border-ink shadow-neo
          bg-paper-dark flex-shrink-0">
          <img id="modal-image" src="" class="w-full h-full object-cover" alt="">
        </div>

        <!-- 이름 + 레코드 수 -->
        <div class="flex flex-col items-start md:items-center flex-1 min-w-0 pr-8 md:pr-0">
          <h2 id="modal-name"
            class="text-base sm:text-xl md:text-2xl lg:text-3xl
            font-black tracking-tight
            mb-1 md:mb-2
            text-left md:text-center
            line-clamp-2 leading-snug w-full"></h2>
          <p id="modal-count"
            class="text-ink font-sans font-bold
            bg-neo-yellow border-2 border-ink
            px-2 md:px-3 py-0.5 md:py-1
            text-[9px] sm:text-[10px] md:text-xs
            tracking-widest uppercase
            whitespace-nowrap"></p>
        </div>

        <!-- 공유 버튼 -->
        <button id="share-btn"
          class="font-sans font-bold
          text-[10px] sm:text-xs md:text-sm
          tracking-widest
          border-2 border-ink bg-white shadow-neo-sm
          px-2 py-1.5 sm:px-3 sm:py-2 md:px-5 md:py-2.5
          hover:bg-neo-mint hover:-translate-y-0.5 hover:shadow-neo
          active:translate-y-0 active:shadow-neo-sm
          transition-all flex-shrink-0 md:mt-8">
          <span class="hidden md:inline">SHARE LINK</span>
          <span class="md:hidden">🔗</span>
        </button>
      </div>

      <!-- ════════════════════════════════
           오른쪽: 도서 영역
           flex column으로 높이 분배
           ════════════════════════════════ -->
      <div class="modal-right flex-1 bg-[#fafaf8] min-w-0">

        <!-- ① 헤더 레이블 (flex-shrink-0) -->
        <div class="flex-shrink-0
          text-[9px] sm:text-[10px] md:text-xs
          font-sans font-bold tracking-widest text-ink
          border-b border-ink/10
          px-4 sm:px-5 md:px-8
          pt-3 sm:pt-4 md:pt-6 pb-2 md:pb-3">
          READING ARCHIVE
        </div>

        <!-- ② 스와이퍼 뷰포트 (flex-1, 남은 공간 전부) -->
        <div id="swiper-viewport"
          class="cursor-grab active:cursor-grabbing
          mx-3 sm:mx-4 md:mx-8
          mt-2 md:mt-3">
          <div id="swiper-track" class="swiper-track h-full flex items-stretch"></div>
        </div>

        <!-- ③ 하단 네비게이션 바 (flex-shrink-0) -->
        <div class="flex-shrink-0
          border-t-2 border-ink/10
          bg-[#fafaf8]
          px-3 sm:px-4 md:px-8
          pt-2.5 pb-3 md:pb-4">

          <!-- PREV / DOTS / NEXT -->
          <div class="flex justify-between items-center">
            <button id="prev-btn"
              class="font-sans font-bold
              text-[9px] sm:text-[10px] md:text-xs
              tracking-widest
              border-2 border-ink bg-white shadow-neo-sm
              px-2.5 py-1.5 md:px-4 md:py-2
              hover:bg-neo-yellow
              disabled:opacity-30 disabled:hover:bg-white
              transition-all">◀ PREV</button>

            <div id="dots-container"
              class="flex gap-1.5 md:gap-2 flex-wrap justify-center"
              style="max-width: 50%"></div>

            <button id="next-btn"
              class="font-sans font-bold
              text-[9px] sm:text-[10px] md:text-xs
              tracking-widest
              border-2 border-ink bg-white shadow-neo-sm
              px-2.5 py-1.5 md:px-4 md:py-2
              hover:bg-neo-yellow
              disabled:opacity-30 disabled:hover:bg-white
              transition-all">NEXT ▶</button>
          </div>

        </div>
      </div><!-- /modal-right -->

    </div><!-- /modal-inner -->
  </div><!-- /modal-overlay -->

  <!-- 토스트 -->
  <div id="toast"
    class="fixed bottom-10 left-1/2 -translate-x-1/2
    bg-ink text-neo-yellow
    font-sans font-bold
    border-2 border-ink
    px-5 py-2.5 md:px-8 md:py-4
    text-[10px] md:text-sm tracking-widest
    opacity-0 translate-y-4 shadow-neo
    transition-all duration-300 z-[100] pointer-events-none
    text-center w-max max-w-[90vw]">
    LINK COPIED TO CLIPBOARD.
  </div>

  <script>
    (function App() {
      'use strict';

      const CACHE_KEY = 'favoread_cache_v5';

      const State = {
        celebMap: {},
        entries: [],
        searchQuery: '',
        modal: { isOpen: false, celebName: null, books: [], swipeIdx: 0, total: 0 }
      };

      const CONFIG = {
        SHEET_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPj4yeC48N1BaYgpr9b-CEkQ4N2Kb_e7iRKQHC5tFMGJEEKxm6lPEHV1xEEfuOJUxCNP3D9sMfcwxJ/pub?output=csv',
        WIKI_API_BASE: 'https://ko.wikipedia.org/w/api.php',
        SITE_URL: (function () {
          try {
            if (document.referrer && document.referrer.includes('sites.google.com')) {
              return document.referrer.split('?')[0];
            }
          } catch (e) {}
          return window.location.href.split('?')[0];
        })()
      };

      const DOM = {
        statusDot:  document.getElementById('status-dot'),
        statusText: document.getElementById('status-text'),
        searchInput: document.getElementById('search-input'),
        grid:        document.getElementById('grid-container'),
        emptyState:  document.getElementById('empty-state'),
        modal: {
          overlay:  document.getElementById('modal-overlay'),
          inner:    document.getElementById('modal-inner'),
          closeBtn: document.getElementById('close-modal'),
          image:    document.getElementById('modal-image'),
          name:     document.getElementById('modal-name'),
          count:    document.getElementById('modal-count'),
          shareBtn: document.getElementById('share-btn'),
          viewport: document.getElementById('swiper-viewport'),
          track:    document.getElementById('swiper-track'),
          prevBtn:  document.getElementById('prev-btn'),
          nextBtn:  document.getElementById('next-btn'),
          dots:     document.getElementById('dots-container')
        },
        toast: document.getElementById('toast')
      };

      /* ─── DataService ─────────────────────────────────────────── */
      const DataService = {
        getCache() {
          try {
            const c = localStorage.getItem(CACHE_KEY);
            return c ? JSON.parse(c) : null;
          } catch (e) { return null; }
        },
        saveCache(data) {
          try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); }
          catch (e) { console.warn('Cache full.', e); }
        },
        async fetchCSV() {
          const res = await fetch(CONFIG.SHEET_URL);
          if (!res.ok) throw new Error('Data connection failed.');
          return await res.text();
        },
        parseCSV(csvText) {
          return new Promise((resolve, reject) => {
            Papa.parse(csvText, {
              header: true, skipEmptyLines: true,
              complete: r => resolve(r.data),
              error:    e => reject(e)
            });
          });
        },
        transformData(rows) {
          const map = {};
          if (!rows.length) return map;
          const keys   = Object.keys(rows[0]);
          const getCol = (kws, fb) => keys.find(k => kws.some(w => k.toLowerCase().includes(w))) || keys[fb];
          const cols   = {
            celeb:    getCol(['이름','연예인','인물'], 0),
            title:    getCol(['도서명','제목','책'], 1),
            author:   getCol(['저자','작가'], 2),
            pub:      getCol(['출판사'], 3),
            source:   getCol(['출처','근거'], 4),
            comment:  getCol(['코멘트','한마디'], 8),
            celebImg: getCol(['연예인이미지','photo'], 7),
            bookImg:  getCol(['도서이미지','표지'], 6),
            link:     getCol(['링크','url'], 5)
          };
          rows.forEach(row => {
            const name  = (row[cols.celeb]  || '').trim();
            const title = (row[cols.title]  || '').trim();
            if (!name || !title) return;
            if (!map[name]) map[name] = { imageUrl: row[cols.celebImg] || '', books: [] };
            map[name].books.push({
              title,
              author:    row[cols.author]  || 'Unknown',
              publisher: row[cols.pub]     || '',
              source:    row[cols.source]  || '',
              comment:   row[cols.comment] || '',
              coverUrl:  row[cols.bookImg] || '',
              link:      row[cols.link]    || '#'
            });
          });
          return map;
        },
        async getWikiImage(name) {
          try {
            const url  = `${CONFIG.WIKI_API_BASE}?action=query&generator=search&gsrsearch=${encodeURIComponent(name)}&gsrlimit=5&prop=pageimages&piprop=thumbnail&pithumbsize=500&format=json&origin=*`;
            const res  = await fetch(url);
            const data = await res.json();
            const pages = Object.values(data?.query?.pages || {});
            const KW = ['가수','배우','방송인','아이돌','뮤지션','작가','유튜버','코미디언','모델'];
            const best = pages.find(p => p.title === name)
              || pages.find(p => KW.some(k => p.title.includes(k) && p.title.includes(name)))
              || pages.find(p => p.title.includes(name));
            return best?.thumbnail?.source || '';
          } catch { return ''; }
        }
      };

      /* ─── View ────────────────────────────────────────────────── */
      const View = {
        setStatus(type, msg) {
          DOM.statusText.textContent = msg;
          DOM.statusDot.className = `w-2 h-2 rounded-full ${
            type === 'loading' ? 'bg-neo-yellow animate-pulse'
            : type === 'error' ? 'bg-neo-pink'
            : 'bg-neo-mint'
          }`;
        },

        renderGrid(entries, keyword = '') {
          DOM.grid.innerHTML = '';
          let count = 0;
          const kw = keyword.toLowerCase();
          entries.forEach(([name, data]) => {
            const str = `${name} ${data.books.map(b => b.title).join(' ')}`.toLowerCase();
            if (kw && !str.includes(kw)) return;
            count++;
            const card = document.createElement('article');
            card.className = 'group cursor-pointer flex flex-col bg-white border-2 border-ink shadow-neo hover:shadow-neo-lg hover:-translate-y-1 transition-all duration-200 opacity-0 animate-fade-in-fast';
            const imgHtml = data.imageUrl
              ? `<img src="${data.imageUrl}" alt="${name}" class="celeb-portrait w-full h-full object-cover">`
              : `<div class="w-full h-full bg-paper-dark flex items-center justify-center font-sans font-bold text-[10px] sm:text-xs tracking-widest text-muted">NO PHOTO</div>`;
            card.innerHTML = `
              <div class="w-full aspect-[3/4] overflow-hidden border-b-2 border-ink bg-paper-dark relative">${imgHtml}</div>
              <div class="p-3 sm:p-5 flex flex-col items-center group-hover:bg-neo-mint transition-colors duration-200">
                <h3 class="text-base sm:text-xl font-bold tracking-tight mb-1 sm:mb-2 text-ink text-center line-clamp-1">${name}</h3>
                <p class="text-[8px] sm:text-[10px] tracking-widest text-ink uppercase font-sans font-bold bg-white border border-ink px-1.5 sm:px-2 py-0.5 shadow-sm">${data.books.length} records</p>
              </div>`;
            card.addEventListener('click', () => Controller.openModal(name, data));
            DOM.grid.appendChild(card);
          });
          DOM.emptyState.classList.toggle('hidden', count > 0);
        },

        updateImage(name, url) {
          DOM.grid.querySelectorAll('article').forEach(card => {
            const h3 = card.querySelector('h3');
            if (h3 && h3.textContent === name) {
              const c = card.querySelector('.aspect-\\[3\\/4\\]');
              if (c) c.innerHTML = `<img src="${url}" alt="${name}" class="celeb-portrait w-full h-full object-cover">`;
            }
          });
        },

        renderModalContent() {
          const { celebName, books, swipeIdx, total } = State.modal;
          const data = State.celebMap[celebName];

          DOM.modal.name.textContent  = celebName;
          DOM.modal.count.textContent = `${total} records`;
          DOM.modal.image.src         = data.imageUrl || '';
          DOM.modal.image.style.display = data.imageUrl ? '' : 'none';

          DOM.modal.track.innerHTML = '';
          DOM.modal.dots.innerHTML  = '';

          books.forEach((book, i) => {
            const slide = document.createElement('div');
            slide.className = 'slide-scroll-area w-full flex-shrink-0 flex flex-col md:flex-row gap-4 md:gap-8 items-center md:items-start px-3 py-4 md:px-4 overflow-y-auto overflow-x-hidden -webkit-overflow-scrolling-touch overscroll-contain';

            const coverHtml = book.coverUrl
              ? `<img src="${book.coverUrl}"
                  class="w-24 sm:w-28 md:w-40 lg:w-44 object-cover border-2 border-ink shadow-neo flex-shrink-0 mx-auto md:mx-0 md:self-start"
                  alt="표지">`
              : `<div class="w-24 sm:w-28 md:w-40 lg:w-44 aspect-[2/3] border-2 border-ink bg-white flex items-center justify-center font-sans font-bold text-xs text-muted shadow-neo flex-shrink-0 mx-auto md:mx-0 md:self-start">COVER</div>`;

            const quoteHtml = book.comment
              ? `<blockquote class="text-xs md:text-sm leading-relaxed text-ink mb-3 md:mb-4 bg-neo-yellow border-2 border-ink p-2.5 md:p-4 shadow-neo-sm font-medium">"${book.comment}"</blockquote>`
              : '';

            const pubHtml = book.publisher
              ? `<span class="opacity-40 mx-1.5 font-light">|</span><span class="text-ink/70">${book.publisher}</span>`
              : '';

            const sourceLink = book.source && book.source.startsWith('http')
              ? `<a href="${book.source}" target="_blank" class="book-inline-link">↗ 출처</a>`
              : '';
            const detailLink = book.link && book.link !== '#'
              ? `<a href="${book.link}" target="_blank" class="book-inline-link">↗ 도서 정보</a>`
              : '';
            const linksHtml = (sourceLink || detailLink)
              ? `<div class="flex gap-4 mt-2 md:mt-3 justify-center md:justify-start">${sourceLink}${detailLink}</div>`
              : '';

            slide.innerHTML = `
              ${coverHtml}
              <div class="flex flex-col w-full text-center md:text-left min-w-0">
                <h4 class="text-lg sm:text-xl md:text-2xl lg:text-3xl font-black tracking-tight leading-snug mb-1.5 md:mb-3 text-ink">${book.title}</h4>
                <p class="text-xs md:text-sm tracking-wide text-ink font-bold mb-3 md:mb-4">${book.author}${pubHtml}</p>
                ${quoteHtml}
                ${linksHtml}
              </div>`;

            DOM.modal.track.appendChild(slide);

            // 도트
            const dot = document.createElement('button');
            dot.className = `w-1.5 h-1.5 md:w-2 md:h-2 rounded-none border border-ink transition-all duration-300 ${i === swipeIdx ? 'bg-ink scale-125' : 'bg-white hover:bg-neo-pink'}`;
            dot.addEventListener('click', () => Controller.goToSlide(i));
            DOM.modal.dots.appendChild(dot);
          });

          this.updateSwiperUI();
        },

        updateBookBtns() { /* 링크는 슬라이드 내부에 인라인으로 포함됨 */ },

        updateSwiperUI() {
          const { swipeIdx, total } = State.modal;
          DOM.modal.track.style.transform = `translateX(-${swipeIdx * 100}%)`;
          DOM.modal.prevBtn.disabled = swipeIdx === 0;
          DOM.modal.nextBtn.disabled = swipeIdx === total - 1;
          Array.from(DOM.modal.dots.children).forEach((dot, i) => {
            dot.className = `w-1.5 h-1.5 md:w-2 md:h-2 rounded-none border border-ink transition-all duration-300 ${
              i === swipeIdx ? 'bg-ink scale-125 shadow-neo-sm' : 'bg-white hover:bg-neo-pink'
            }`;
          });
          this.updateBookBtns();
        },

        showToast() {
          DOM.toast.classList.remove('opacity-0', 'translate-y-4');
          setTimeout(() => DOM.toast.classList.add('opacity-0', 'translate-y-4'), 3000);
        }
      };

      /* ─── Controller ──────────────────────────────────────────── */
      const Controller = {
        async init() {
          this.bindEvents();

          const cachedMap = DataService.getCache();
          if (cachedMap && Object.keys(cachedMap).length > 0) {
            State.celebMap = cachedMap;
            State.entries  = Object.entries(State.celebMap).sort(() => Math.random() - 0.5);
            View.renderGrid(State.entries);
            View.setStatus('success', `LOADED FROM CACHE : ${State.entries.length} RECORDS`);
          } else {
            View.setStatus('loading', 'Syncing with Archive...');
          }

          try {
            const csv      = await DataService.fetchCSV();
            const rows     = await DataService.parseCSV(csv);
            const freshMap = DataService.transformData(rows);
            if (!cachedMap || JSON.stringify(cachedMap) !== JSON.stringify(freshMap)) {
              State.celebMap = freshMap;
              DataService.saveCache(freshMap);
              State.entries = Object.entries(State.celebMap).sort(() => Math.random() - 0.5);
              View.renderGrid(State.entries);
              View.setStatus('success', `SYNC COMPLETE : ${State.entries.length} RECORDS`);
              this.loadMissingImagesAndSave();
            } else {
              View.setStatus('success', `UP TO DATE : ${State.entries.length} RECORDS`);
            }
          } catch (e) {
            if (!cachedMap) View.setStatus('error', 'Network Disconnected');
            else View.setStatus('success', 'OFFLINE MODE (Using Cache)');
          }
        },

        async loadMissingImagesAndSave() {
          let updated = false;
          for (const [name, data] of State.entries) {
            if (!data.imageUrl) {
              const url = await DataService.getWikiImage(name);
              if (url) { data.imageUrl = url; View.updateImage(name, url); updated = true; }
            }
          }
          if (updated) DataService.saveCache(State.celebMap);
        },

        openModal(name, data) {
          State.modal = { isOpen: true, celebName: name, books: data.books, swipeIdx: 0, total: data.books.length };
          View.renderModalContent();
          DOM.modal.overlay.classList.add('active');
          document.body.style.overflow = 'hidden';
        },

        closeModal() {
          State.modal.isOpen = false;
          DOM.modal.overlay.classList.remove('active');
          document.body.style.overflow = '';
          setTimeout(() => {
            DOM.modal.track.innerHTML = '';
            DOM.modal.dots.innerHTML  = '';
          }, 300);
        },

        goToSlide(idx) {
          State.modal.swipeIdx = Math.max(0, Math.min(idx, State.modal.total - 1));
          View.updateSwiperUI();
        },

        fallbackCopy(text) {
          try {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            View.showToast();
          } catch (e) {
            prompt('아래 링크를 길게 눌러 복사해주세요:', text);
          }
        },

        handleShare() { this.fallbackCopy(CONFIG.SITE_URL); },

        bindEvents() {
          DOM.searchInput.addEventListener('input', e => {
            State.searchQuery = e.target.value;
            View.renderGrid(State.entries, State.searchQuery);
          });

          DOM.modal.closeBtn.addEventListener('click', () => this.closeModal());
          DOM.modal.overlay.addEventListener('click', e => {
            if (e.target === DOM.modal.overlay) this.closeModal();
          });

          document.addEventListener('keydown', e => {
            if (!State.modal.isOpen) return;
            if (e.key === 'Escape')     this.closeModal();
            if (e.key === 'ArrowLeft')  this.goToSlide(State.modal.swipeIdx - 1);
            if (e.key === 'ArrowRight') this.goToSlide(State.modal.swipeIdx + 1);
          });

          DOM.modal.shareBtn.addEventListener('click', () => this.handleShare());
          DOM.modal.prevBtn.addEventListener('click',  () => this.goToSlide(State.modal.swipeIdx - 1));
          DOM.modal.nextBtn.addEventListener('click',  () => this.goToSlide(State.modal.swipeIdx + 1));

          // ── 스와이프 (터치 + 마우스) ──
          let startX = 0, isDragging = false;
          const onStart = e => {
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            isDragging = true;
          };
          const onEnd = e => {
            if (!isDragging) return;
            isDragging = false;
            const endX = e.type.includes('mouse') ? e.clientX : e.changedTouches[0].clientX;
            if (Math.abs(startX - endX) > 50)
              this.goToSlide(State.modal.swipeIdx + (startX - endX > 0 ? 1 : -1));
          };
          DOM.modal.viewport.addEventListener('mousedown',  onStart);
          document.addEventListener('mouseup',              onEnd);
          DOM.modal.viewport.addEventListener('touchstart', onStart, { passive: true });
          DOM.modal.viewport.addEventListener('touchend',   onEnd);
        }
      };

      document.addEventListener('DOMContentLoaded', () => Controller.init());
    })();
  </script>
</body>
</html>
